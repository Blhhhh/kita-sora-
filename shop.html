    .bg-overlay{
      position:fixed;
      inset:0;
      background:linear-gradient(to bottom, rgba(8,14,24,0.5) 0%, rgba(8,14,24,0.7) 100%);
      z-index:1;
    }

    /* Main content */
    .container{
      position:relative;
      z-index:2;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 24px;
    }

    .eyebrow{
      font-family:'Lora',serif;
      font-style:italic;
      font-size:13px;
      color:rgba(197,217,238,0.5);
      letter-spacing:0.18em;
      text-transform:uppercase;
      margin-bottom:32px;
      animation:fadeUp 1s ease 0.2s both;
    }

    .title{
      font-family:'Great Vibes',cursive;
      font-size:clamp(60px,12vw,120px);
      color:#EEF4FA;
      line-height:1.1;
      margin-bottom:24px;
      animation:fadeUp 1s ease 0.4s both;
    }

    .subtitle{
      font-family:'Lora',serif;
      font-style:italic;
      font-size:clamp(16px,2vw,22px);
      color:rgba(197,217,238,0.7);
      line-height:1.8;
      max-width:480px;
      margin-bottom:52px;
      animation:fadeUp 1s ease 0.6s both;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:52px;
      animation:fadeUp 1s ease 0.7s both;
    }
    .divider span{
      font-size:10px;
      color:rgba(197,217,238,0.3);
      letter-spacing:0.2em;
    }
    .divider-line{
      width:60px;
      height:1px;
      background:rgba(197,217,238,0.2);
    }

    .notify-wrap{
      animation:fadeUp 1s ease 0.8s both;
    }
    .notify-label{
      font-family:'Lora',serif;
      font-style:italic;
      font-size:13px;
      color:rgba(197,217,238,0.4);
      letter-spacing:0.1em;
      margin-bottom:16px;
    }
    .notify-form{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .notify-input{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(197,217,238,0.2);
      border-radius:100px;
      color:#EEF4FA;
      font-family:'Lora',serif;
      font-style:italic;
      font-size:15px;
      padding:12px 24px;
      outline:none;
      width:240px;
      transition:border-color 0.3s;
    }
    .notify-input::placeholder{color:rgba(197,217,238,0.3);}
    .notify-input:focus{border-color:rgba(197,217,238,0.5);}
    .notify-btn{
      background:rgba(197,217,238,0.12);
      border:1px solid rgba(197,217,238,0.3);
      border-radius:100px;
      color:rgba(238,244,250,0.8);
      font-family:'Lora',serif;
      font-style:italic;
      font-size:15px;
      padding:12px 28px;
      cursor:pointer;
      transition:background 0.3s, border-color 0.3s;
    }
    .notify-btn{
      display:inline-block;
      text-decoration:none;
    }
    .notify-sub{
      margin-top:16px;
      font-family:'Lora',serif;
      font-style:italic;
      font-size:12px;
      color:rgba(197,217,238,0.3);
      letter-spacing:0.08em;
    }
    .notify-btn:hover{
      background:rgba(197,217,238,0.22);
      border-color:rgba(197,217,238,0.5);
    }
    .notify-thanks{
      display:none;
      font-family:'Lora',serif;
      font-style:italic;
      font-size:15px;
      color:rgba(197,217,238,0.7);
      margin-top:16px;
    }

    /* Back link */
    .back{

<body>

<div class="bg"></div>
<div class="bg-overlay"></div>
<canvas id="snowCanvas"></canvas>

<a href="index.html" class="back">← back to the world</a>
<a href="index.html" class="logo">Kita-Sora</a>

<div class="container">
  <p class="eyebrow">the shop · kita-sora</p>
  <h1 class="title">Coming Soon</h1>
  <p class="subtitle">
    Something is being made with care.<br>
    <em>We'll let you know when it's ready.</em>
  </p>
  <div class="divider">
    <div class="divider-line"></div>
    <span>✦</span>
    <div class="divider-line"></div>
  </div>
  <div class="notify-wrap">
    <p class="notify-label">want to be the first to know?</p>
    <a href="https://lynnfromkitasora.substack.com" target="_blank" rel="noopener" class="notify-btn">
      subscribe to the letters →
    </a>
    <p class="notify-sub">free · unsubscribe anytime</p>
  </div>
</div>

<script>
// Notify button
document.getElementById('notifyBtn').addEventListener('click', ()=>{
  const email = document.getElementById('emailInput').value;
  if(email && email.includes('@')){
    document.querySelector('.notify-form').style.display = 'none';
    document.getElementById('notifyThanks').style.display = 'block';
  } else {
    document.getElementById('emailInput').style.borderColor = 'rgba(255,120,120,0.5)';
    setTimeout(()=>{
      document.getElementById('emailInput').style.borderColor = 'rgba(197,217,238,0.2)';
    }, 1000);
  }
});

// Snow
const canvas = document.getElementById('snowCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
const flakes = Array.from({length:45},()=>{
  return {
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    r:1.5+Math.random()*3,
    speed:0.3+Math.random()*0.6,
    drift:(Math.random()-0.5)*0.3,
    opacity:0.3+Math.random()*0.4,
    type:Math.random()<0.4?'star':'snow',
    rot:Math.random()*Math.PI*2,
    rotSpeed:(Math.random()-0.5)*0.03
  };
});
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  flakes.forEach(p=>{
    p.y+=p.speed; p.x+=p.drift;
    if(p.y>canvas.height+10)p.y=-10;
    if(p.x>canvas.width+10)p.x=-10;
    if(p.x<-10)p.x=canvas.width+10;
    ctx.save();
    ctx.globalAlpha=p.opacity;
    if(p.type==='snow'){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    } else {
      p.rot+=p.rotSpeed;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle='#fff';ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=(i*4*Math.PI/5)-Math.PI/2;
        const ia=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
        if(i===0)ctx.moveTo(Math.cos(a)*p.r,Math.sin(a)*p.r);
        else ctx.lineTo(Math.cos(a)*p.r,Math.sin(a)*p.r);
        ctx.lineTo(Math.cos(ia)*p.r*0.4,Math.sin(ia)*p.r*0.4);
      }
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
